<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Amigos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 900px;
            width: 100%;
            justify-content: center;
        }

        .card {
            background: #34495e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            flex: 1 1 calc(50% - 20px); /* Ocupa la mitad menos el gap en PC */
            min-width: 260px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #f1c40f;
        }

        .time {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #bdc3c7;
        }

        .highlight-text {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        input {
            padding: 12px;
            width: 100%;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #2ecc71;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .btn-reset {
            background-color: #c0392b;
            margin-top: 10px;
            font-size: 0.85rem;
            padding: 8px 15px;
        }

        .btn-reset:hover {
            background-color: #e74c3c;
        }
        
        .btn-lol {
            background-color: #8e44ad;
        }

        .btn-lol:hover {
            background-color: #9b59b6;
        }

        .result {
            font-size: 1.8rem;
            margin-top: 20px;
            font-weight: bold;
            color: #3498db;
            min-height: 40px; /* Evita que la tarjeta salte al vaciarse */
        }

        .result.accept { color: #2ecc71; }
        .result.reject { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Hora de Kurei (España)</h2>
            <p>Zona horaria: Europa/Madrid</p>
            <div id="spain-time" class="time">--:--:--</div>
        </div>

        <div class="card">
            <h2>Calculadora de Leche</h2>
            <p>Costo base: $45 UYU / Litro</p>
            <input type="number" id="money-input" placeholder="Ingresa el monto (ej. 1000)">
            <button onclick="calculateMilk()">Convertir a Litros</button>
            <div id="milk-result" class="result">0 L</div>
        </div>

        <div class="card">
            <h2>🗣️ Contador "Por supuesto"</h2>
            <p>Registro oficial de Christian</p>
            <button onclick="incrementCounter()">¡Lo dijo!</button>
            <div id="word-counter" class="result">0</div>
            <button onclick="resetCounter()" class="btn-reset">Reiniciar cuenta</button>
        </div>

        <div class="card">
            <h2> ¡Aweh entro a ds!</h2>
            <span class="highlight-text">Aweh te ha invitado a jugar LoL</span>
            <button id="btn-decide" class="btn-lol" onclick="decideAweh()">Lanzar moneda</button>
            <div id="aweh-result" class="result">¿Qué hacemos?</div>
        </div>
    </div>

    <script>
        function updateSpainTime() {
            const options = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const timeString = new Intl.DateTimeFormat('es-ES', options).format(new Date());
            document.getElementById('spain-time').textContent = timeString;
        }
        setInterval(updateSpainTime, 1000);
        updateSpainTime(); 

        const PRECIO_LECHE_UYU = 45; 

        function calculateMilk() {
            const input = document.getElementById('money-input').value;
            const resultDiv = document.getElementById('milk-result');
            
            if (input && input > 0) {
                const liters = (input / PRECIO_LECHE_UYU).toFixed(2);
                resultDiv.textContent = `${liters} L`;
            } else {
                resultDiv.textContent = 'Monto inválido';
            }
        }

        let currentCount = localStorage.getItem('porSupuestoCount') ? parseInt(localStorage.getItem('porSupuestoCount')) : 0;
        const counterDisplay = document.getElementById('word-counter');
        counterDisplay.textContent = currentCount;

        function incrementCounter() {
            currentCount++;
            localStorage.setItem('porSupuestoCount', currentCount); 
            counterDisplay.textContent = currentCount;
        }

        function resetCounter() {
            if(confirm('¿Estás seguro de que quieres borrar el registro de Christian?')) {
                currentCount = 0;
                localStorage.setItem('porSupuestoCount', currentCount);
                counterDisplay.textContent = currentCount;
            }
        }

 
        function decideAweh() {
            const resultDiv = document.getElementById('aweh-result');
            const btn = document.getElementById('btn-decide');
            
            btn.disabled = true;
            resultDiv.textContent = "Lanzando moneda...";
            resultDiv.className = "result"; 

            setTimeout(() => {
                const isAccept = Math.random() >= 0.5; // 50% de chance
                
                if (isAccept) {
                    resultDiv.textContent = "¡ACEPTAR! 🟢";
                    resultDiv.classList.add("accept");
                } else {
                    resultDiv.textContent = "¡RECHAZAR! 🔴";
                    resultDiv.classList.add("reject");
                }
                
                btn.disabled = false;
            }, 2000); //delay de 2 segundos
        }
    </script>
</body>
</html>
